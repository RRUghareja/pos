[build]
  base = "."
  publish = "admin-panel/dist"
  # Netlify auto-runs `npm install` from the repo root before this command (workspaces install everything).
  command = "cd backend && npx prisma generate && cd ../admin-panel && npm run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Prisma's client + engine are loaded at runtime via require, so we mark them
  # external (not bundled) and bring the necessary files along with included_files.
  external_node_modules = ["@prisma/client", ".prisma/client"]
  included_files = [
    "node_modules/.prisma/**",
    "node_modules/@prisma/client/**",
    "backend/node_modules/.prisma/**",
    "backend/node_modules/@prisma/client/**",
    "backend/prisma/**",
  ]

# Route /api/* to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback for the admin panel
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  # Tell Vite where the API lives so the admin panel calls our deployed function.
  # Empty string means "same origin", which is what we want here.
  VITE_API_URL = ""
